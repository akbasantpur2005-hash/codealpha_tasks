<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nature, City & Animal Gallery</title>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="gallery-container">
    <h1>World Wonders Gallery</h1>
    
    
    <div class="gallery-grid">
      <div class="gallery-item img-1"></div>
      <div class="gallery-item img-2"></div>
      <div class="gallery-item img-3"></div>
      <div class="gallery-item img-4"></div>
      <div class="gallery-item img-5"></div>
      <div class="gallery-item img-6"></div>
    </div>
  </div>

  
  <div class="lightbox" id="lightbox">
    <span class="close-btn" id="closeBtn">&times;</span>
    <img class="lightbox-img" id="lightboxImg" src="" alt="Popup Preview">
  </div>

  
  <script src="script.js"></script>
</body>
</html>
